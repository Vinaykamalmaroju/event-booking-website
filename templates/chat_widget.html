<div id="chat-widget">

    <button id="chat-toggle">

        💬

    </button>

    <div id="chat-window">

        <div class="chat-header">

            AI Assistant

        </div>

        <div id="messages">

            <div class="bot">

                Hello 👋

            </div>

        </div>

        <div class="chat-footer">

            <input
                type="text"
                id="chat-input"
                placeholder="Ask something...">

            <button onclick="sendChat()">

                Send

            </button>

        </div>

    </div>

</div>
