<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Login | Event Booking Website</title>

    <!-- Favicon -->
    <link rel="icon"
          href="{{ url_for('static', filename='favicon.ico') }}"
          type="image/x-icon">

    <!-- CSS Files -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/common.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/admin_login.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/animations.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/chatbot_button.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/chat_widget.css') }}">

</head>

<body class="fade-in">

<!-- ================= HEADER ================= -->

<header class="fade-in">

    <h1>Event Booking Website</h1>

    <nav>
        <a href="/">Home</a>
        <a href="/booking">Book Event</a>
        <a href="/providers">Providers</a>
        <a href="/contact">Contact</a>
    </nav>

</header>

<!-- ================= LOGIN CONTAINER ================= -->

<div class="login-container slide-up">

    <div class="login-box hover-card">

        <div class="login-icon zoom">
            🔐
        </div>

        <h1 class="fade-in">
            Administrator Login
        </h1>

        <p class="fade-in">
            Login to manage bookings, providers, customers,
            payments and reports.
        </p>

        <!-- ================= LOGIN FORM ================= -->

        <form method="POST"
              action="{{ url_for('admin_login') }}">

            <input
                class="zoom"
                type="text"
                name="username"
                placeholder="👤 Enter Username"
                required>

            <input
                class="zoom"
                type="password"
                name="password"
                placeholder="🔒 Enter Password"
                required>

            <button
                class="btn-hover"
                type="submit">

                🚀 Login

            </button>

        </form>

        <br>

        <a href="/"
           class="back-home">

            ← Back to Home

        </a>

    </div>

</div>

<!-- ================= CHAT WIDGET ================= -->

{% include "chat_widget.html" %}

<!-- Floating Chat Button -->

<a href="/chat" class="chatbot-button">
    💬
</a>

<!-- Chat Script -->

<script src="{{ url_for('static', filename='js/chat_widget.js') }}"></script>

</body>
</html>
