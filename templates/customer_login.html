<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Customer Login</title>

<link rel="stylesheet"
      href="{{ url_for('static', filename='css/common.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/customer_login.css') }}">

<link rel="stylesheet"
          href="{{ url_for('static', filename='css/animations.css') }}">

<link rel="stylesheet"
href="{{ url_for('static', filename='css/chatbot_button.css') }}">
          



</head>

<body>

<div class="login-container">

    <div class="login-box">

        <h2>Customer Login</h2>

        <p class="subtitle">
            Login to manage your bookings
        </p>

        <form action="/customer-login" method="POST">

            <div class="input-group">

                <label>Email Address</label>

                <input
                    type="email"
                    name="email"
                    placeholder="Enter your email"
                    required>

            </div>

            <div class="input-group">

                <label>Password</label>

                <input
                    type="password"
                    name="password"
                    placeholder="Enter your password"
                    required>

            </div>

            <button type="submit">
                Login
            </button>

        </form>

        <div class="links">

            <p>
                Don't have an account?
                <a href="/customer-register">
                    Register Here
                </a>
            </p>

            <p>
                <a href="/">
                    ← Back to Home
                </a>
            </p>

        </div>

    </div>

</div>

<!-- Chat Widget -->
{% include "chat_widget.html" %}

<link rel="stylesheet"
href="{{ url_for('static', filename='css/chat_widget.css') }}">

<script src="{{ url_for('static', filename='js/chat_widget.js') }}"></script>


</body>

<a href="/chat"
class="chatbot-button">

💬

</a>

</html>
