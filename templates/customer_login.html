<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Customer Login</title>

    <link rel="icon"
          href="{{ url_for('static', filename='favicon.ico') }}"
          type="image/x-icon">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Common CSS -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/common.css') }}">

    <!-- Login CSS -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/customer_login.css') }}">

    <!-- Animations -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/animations.css') }}">

    <!-- Chat Button -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/chatbot_button.css') }}">

    <!-- Chat Widget -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/chat_widget.css') }}">

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>

<body>

<div class="login-container">

    <div class="login-box">

        <h2>Customer Login</h2>

        <p class="subtitle">
            Login to manage your bookings
        </p>

        <form action="/customer-login" method="POST">

            <div class="input-group">

                <label>Email Address</label>

                <input
                    type="email"
                    name="email"
                    placeholder="Enter your email"
                    required>

            </div>

            <div class="input-group">

                <label>Password</label>

                <input
                    type="password"
                    name="password"
                    placeholder="Enter your password"
                    required>

            </div>

            <button type="submit">
                Login
            </button>

        </form>

        <div class="links">

            <p>
                Don't have an account?
                <a href="/customer-register">
                    Register Here
                </a>
            </p>

            <p>
                <a href="/">
                    ← Back to Home
                </a>
            </p>

        </div>

    </div>

</div>

<!-- Chat Widget -->
{% include "chat_widget.html" %}

<script src="{{ url_for('static', filename='js/chat_widget.js') }}"></script>

<!-- Floating Chat Button -->
<a href="/chat" class="chatbot-button">
    💬
</a>

<!-- SweetAlert Flash Messages -->
{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
    {% for category, message in messages %}

    <script>

    Swal.fire({
        icon: "{% if category == 'success' %}success{% elif category == 'danger' %}error{% elif category == 'warning' %}warning{% else %}info{% endif %}",
        title: "{{ message }}",
        confirmButtonColor: "#2563eb",
        confirmButtonText: "OK"
    });

    </script>
        {% endfor %}
    {% endif %}
{% endwith %}

</body>

</html>
