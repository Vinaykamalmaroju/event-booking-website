<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Provider Login</title>

    <link rel="icon"
          href="{{ url_for('static', filename='favicon.ico') }}"
          type="image/x-icon">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/common.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/provider_login.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/animations.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/chatbot_button.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/chat_widget.css') }}">

</head>

<body class="provider-login-page fade-in">

<div class="provider-login-container slide-up">

    <h1>Provider Login</h1>

    <p>
        Sign in to manage your bookings
    </p>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}

        {% for category, message in messages %}

            <div class="alert {{ category }}">
                {{ message }}
            </div>

        {% endfor %}

    {% endif %}
    {% endwith %}

    <form method="POST" action="/provider-login">

        <input
            class="zoom"
            type="email"
            name="email"
            placeholder="Email Address"
            required>

        <input
            class="zoom"
            type="password"
            name="password"
            placeholder="Password"
            required>

        <button
            class="btn-hover"
            type="submit">

            🔐 Login

        </button>

    </form>

    <div class="provider-login-footer">

        New Provider?

        <a href="/provider-register">

            Register Here

        </a>

    </div>

</div>

<!-- Chat Widget -->
{% include "chat_widget.html" %}

<a href="/chat" class="chatbot-button">

    💬

</a>

<script src="{{ url_for('static', filename='js/chat_widget.js') }}"></script>

</body>

</html>
