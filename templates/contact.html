
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Contact Us</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/common.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/contact.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/animations.css') }}">

<link rel="stylesheet"
href="{{ url_for('static', filename='css/chatbot_button.css') }}">


</head>

<body class="fade-in">

<header class="fade-in">

    <h1>Event Booking Website</h1>

    <nav>

        <a href="/">Home</a>

        <a href="/booking">Book Event</a>

        <a href="/providers">Providers</a>

        <a href="/contact">Contact</a>

    </nav>

</header>

<div class="booking-form slide-up">

    <h1 class="fade-in">

        📞 Contact Us

    </h1>

    <p class="fade-in">

        We'd love to hear from you! Fill out the form below and our support
        team will get back to you as soon as possible.

    </p>

    <form
        action="/contact-submit"
        method="POST">

        <input
            class="zoom"
            type="text"
            name="name"
            placeholder="👤 Full Name"
            required>

        <input
            class="zoom"
            type="email"
            name="email"
            placeholder="📧 Email Address"
            required>

        <input
            class="zoom"
            type="tel"
            name="phone"
            placeholder="📱 Phone Number"
            required>

        <textarea
            class="zoom"
            name="message"
            rows="6"
            placeholder="💬 Write your message here..."
            required></textarea>

        <button
            class="btn-hover"
            type="submit">

            📨 Send Message

        </button>

    </form>

</div>

<!-- Chat Widget -->
{% include "chat_widget.html" %}

<link rel="stylesheet"
href="{{ url_for('static', filename='css/chat_widget.css') }}">

<script src="{{ url_for('static', filename='js/chat_widget.js') }}"></script>

</body>


<a href="/chat"
class="chatbot-button">

💬

</a>

</html>
